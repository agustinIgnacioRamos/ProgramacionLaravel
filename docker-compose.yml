services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: programacion-laravel:latest
    container_name: programacion-laravel-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: programacion-laravel-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: programacion
      MYSQL_USER: programacion
      MYSQL_PASSWORD: programacion_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
